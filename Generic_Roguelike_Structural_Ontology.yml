Conceptual Layers

A roguelikeвЂ™s architecture generally resolves into four systemic layers:
##########################################################
##Layer	             ##Role                             ##
##                   ##                                 ##
##########################################################
Actor Systems	     - player, monsters, NPCs
Interaction Systems	 - combat, magic, items
World Systems	     - dungeon generation, encounters
Meta Systems	     - progression, victory conditions


#Minimal Roguelike Kernel
If reduced to the smallest functional model:{
Roguelike
 в”њв”Ђ Actor_Model
 в”њв”Ђ Turn_System
 в”њв”Ђ World_Generation
 в”њв”Ђ Combat_System
 в”њв”Ђ Item_System
 в”њв”Ђ Progression_System
 в””в”Ђ Victory_System
}

Everything else extends from these primitives.