Below is a generic structural ontology for roguelike games.
It is system-agnostic and describes the mechanical architecture common to traditional roguelikes (procedural, turn-based, permadeath, systemic interaction). It avoids specific items or monsters and instead organizes categories of mechanics.

This is intended as a design grammar or AI training scaffold for generating roguelike systems.

